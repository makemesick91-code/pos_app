# Reusable: backend full test suite + consolidated governance gates.
# Replaces the per-sprint duplication of `php artisan test` (was run in ~44
# workflows) with ONE authoritative execution. Governance smoke/go-no-go gates
# are preserved (run once here), never weakened (CICD2-R011, R012).
name: _backend-tests

on:
  workflow_call:
    inputs:
      run_governance:
        description: Run consolidated per-sprint governance smoke + go/no-go gates
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  backend-suite:
    name: Backend full suite (php artisan test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Validate composer
        working-directory: backend
        run: composer validate --strict

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-php8.5-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php8.5-

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run full backend test suite
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  backend-governance:
    name: Consolidated governance smoke + go/no-go gates
    if: ${{ inputs.run_governance }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-php8.5-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php8.5-

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run every sprint governance smoke (consolidated)
        run: bash scripts/ci/run_backend_governance.sh
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: No forbidden files committed
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|\.apk$|\.aab$|(^|/)vendor/|(^|/)node_modules/|\.sqlite$|database\.sqlite|(^|/)app/build/|(^|/)\.gradle/|\.keystore$|\.jks$'
