name: UIX-7 CI

on:
  # CICD-CTRL-2: neutralized to manual-only; superseded by ci-authoritative.yml (Lane B)
  # and ci-main-smoke.yml (Lane C). Full validation still runnable on demand.
  workflow_dispatch:
jobs:
  android-cashier-foundation-gate:
    name: UIX-7 Android cashier foundation + design gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Application foundation rules gate
        run: bash scripts/verify_application_foundation_rules.sh

      - name: UIX-7 Android cashier design gate (chains UIX-6/5/4/3/2/1)
        run: bash scripts/uix7_android_design_gate.sh

      - name: UIX-7 pilot connectivity & network-security gate (UIX7-R045..R051)
        run: bash scripts/uix7_pilot_connectivity_gate.sh

      - name: UIX-7 physical-device runtime closure gate (UIX7-R052..R070)
        run: bash scripts/uix7_runtime_closure_gate.sh

      - name: UIX-7 runtime closure gate self-tests
        run: bash tests/ci/uix7_runtime_closure_gate_test.sh

      - name: UIX-7 rules present (UIX7-R001..R070)
        run: |
          for i in $(seq -w 1 70); do
            grep -q "UIX7-R0$i" docs/PROJECT_RULES.md
            grep -q "UIX7-R0$i" docs/foundation/uix-7-android-cashier-experience-remediation.md
            grep -q "UIX7-R0$i" .claude/rules/55-android-cashier-experience.md
          done

  android-build-test:
    name: UIX-7 Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Package and SDK levels intact
        run: |
          grep -q "com.aishtech.poslite" android/app/build.gradle.kts
          grep -q "minSdk = 26" android/app/build.gradle.kts
          grep -q "targetSdk = 35" android/app/build.gradle.kts

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK (emulator dev — http://10.0.2.2:8000/)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build pilot APK (physical-device — HTTPS aishpos.online, cleartext denied)
        working-directory: android
        run: ./gradlew assemblePilot --no-daemon --stacktrace

      - name: Build release APK (production — HTTPS base URL, cleartext denied)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Unit tests — all variants (incl. variant-aware endpoint contract)
        working-directory: android
        run: ./gradlew testDebugUnitTest testPilotUnitTest testReleaseUnitTest --no-daemon --stacktrace

      - name: Assert generated BuildConfig endpoints per variant (UIX7-R046/R049)
        working-directory: android
        run: |
          set -euo pipefail
          ./gradlew :app:generateDebugBuildConfig :app:generatePilotBuildConfig :app:generateReleaseBuildConfig --no-daemon --stacktrace
          check() { # <variant-dir> <expected-url> <forbid-local:true|false>
            local dir="$1" want="$2" forbid="$3"
            local cfg; cfg=$(find app/build -path "*/$dir/*BuildConfig.java" | head -1)
            [ -n "$cfg" ] || { echo "::error::no BuildConfig for $dir"; exit 1; }
            echo "Inspecting $dir BuildConfig: $cfg"
            grep -q "API_BASE_URL = \"$want\"" "$cfg" \
              || { echo "::error::$dir BuildConfig endpoint != $want"; exit 1; }
            if [ "$forbid" = "true" ] && grep -Eq '10\.0\.2\.2|localhost|127\.0\.0\.1' "$cfg"; then
              echo "::error::$dir BuildConfig leaks an emulator/local host"; exit 1
            fi
          }
          check debug   "http://10.0.2.2:8000/"   false
          check pilot   "https://aishpos.online/"  true
          check release "https://aishpos.online/"  true
          echo "BuildConfig endpoint contract verified for debug/pilot/release."

      - name: Record pilot artifact traceability (UIX7-R038)
        working-directory: android
        run: |
          echo "source_commit=${GITHUB_SHA}"
          echo "package_id=com.aishtech.poslite versionName=0.1.0 versionCode=1"
          echo "== APK SHA-256 =="
          find app/build/outputs/apk -name '*.apk' -print -exec sha256sum {} \;

      - name: Upload pilot APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uix7-pilot-apks-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/pilot/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: No secret leakage in Android sources
        run: |
          ! grep -REn 'BEARER [A-Za-z0-9]|api[_-]?key\s*=\s*"[A-Za-z0-9]{16}|password\s*=\s*"' android/app/src/main || true
