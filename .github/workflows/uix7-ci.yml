name: UIX-7 CI

on:
  push:
  pull_request:

jobs:
  android-cashier-foundation-gate:
    name: UIX-7 Android cashier foundation + design gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Application foundation rules gate
        run: bash scripts/verify_application_foundation_rules.sh

      - name: UIX-7 Android cashier design gate (chains UIX-6/5/4/3/2/1)
        run: bash scripts/uix7_android_design_gate.sh

      - name: UIX-7 rules present (UIX7-R001..R044)
        run: |
          for i in $(seq -w 1 44); do
            grep -q "UIX7-R0$i" docs/PROJECT_RULES.md
            grep -q "UIX7-R0$i" docs/foundation/uix-7-android-cashier-experience-remediation.md
            grep -q "UIX7-R0$i" .claude/rules/55-android-cashier-experience.md
          done

  android-build-test:
    name: UIX-7 Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Package and SDK levels intact
        run: |
          grep -q "com.aishtech.poslite" android/app/build.gradle.kts
          grep -q "minSdk = 26" android/app/build.gradle.kts
          grep -q "targetSdk = 35" android/app/build.gradle.kts

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (pilot artifact — HTTPS base URL, cleartext denied)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Unit tests (incl. RupiahMoney + offline-sync recovery)
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: No secret leakage in Android sources
        run: |
          ! grep -REn 'BEARER [A-Za-z0-9]|api[_-]?key\s*=\s*"[A-Za-z0-9]{16}|password\s*=\s*"' android/app/src/main || true
