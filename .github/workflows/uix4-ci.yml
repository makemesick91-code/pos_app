name: UIX-4 CI

on:
  push:
  pull_request:

jobs:
  console-gate:
    name: UIX-4 owner console gate + backend regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Application foundation rules gate
        run: bash scripts/verify_application_foundation_rules.sh

      - name: UIX-4 tenant-owner console design gate (chains UIX-3/UIX-2/UIX-1)
        run: bash scripts/uix4_design_gate.sh

      - name: UIX-4 rules present (UIX4-R001..R022)
        run: |
          for i in $(seq -w 1 22); do
            grep -q "UIX4-R0$i" docs/PROJECT_RULES.md
            grep -q "UIX4-R0$i" docs/foundation/uix-4-tenant-owner-web-console.md
          done

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare sqlite environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: UIX-4 feature tests
        working-directory: backend
        run: php artisan test --testsuite=Feature --filter='Uix4'
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Backend full regression suite
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  android:
    name: Android build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Android unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest
      - name: Android assemble debug
        working-directory: android
        run: ./gradlew assembleDebug
