name: Sprint 0 CI

on:
  push:
  pull_request:

jobs:
  foundation-validation:
    name: Foundation & structure validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Foundation document exists
        run: test -f docs/foundation/POS_ANDROID_SAAS_FOUNDATION.md

      - name: README references foundation
        run: grep -q "POS_ANDROID_SAAS_FOUNDATION" README.md

      - name: PROJECT_RULES references foundation
        run: grep -q "POS_ANDROID_SAAS_FOUNDATION" docs/PROJECT_RULES.md

      - name: Sprint 0 smoke script
        run: bash scripts/sprint0_smoke.sh

  backend-validation:
    name: Backend composer validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Composer validate
        working-directory: backend
        run: composer validate --strict

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan test

  android-validation:
    name: Android structure validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android skeleton files exist
        run: |
          test -f android/settings.gradle.kts
          test -f android/app/build.gradle.kts
          test -f android/app/src/main/AndroidManifest.xml
          test -f android/app/src/main/java/com/aishtech/poslite/MainActivity.kt

      - name: Package and SDK levels are correct
        run: |
          grep -q "com.aishtech.poslite" android/app/build.gradle.kts
          grep -Eq "minSdk *= *26" android/app/build.gradle.kts
          grep -Eq "targetSdk *= *35" android/app/build.gradle.kts
