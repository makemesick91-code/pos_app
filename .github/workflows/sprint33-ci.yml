name: Sprint 33 CI

on:
  # CICD-CTRL-2: neutralized to manual-only; superseded by ci-authoritative.yml (Lane B)
  # and ci-main-smoke.yml (Lane C). Full validation still runnable on demand.
  workflow_dispatch:
jobs:
  foundation-and-smoke:
    name: Foundation & Sprint 33 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite)
        working-directory: backend
        run: |
          cp .env.example .env
          # The smoke script runs `php artisan` gates; persist sqlite into .env
          # (the example defaults to pgsql) so no per-step env override is needed.
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=database/database.sqlite#' .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Foundation document exists
        run: test -f docs/foundation/POS_ANDROID_SAAS_FOUNDATION.md

      - name: Project rules lock intact (Sprint 32–33)
        run: |
          grep -q "Sprint 32 Plan Entitlement Runtime Enforcement & Subscription Access Control Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 33 Tenant Onboarding, Trial Activation & First-Branch Provisioning Foundation Runtime Rule" docs/PROJECT_RULES.md

      - name: ONB rules present in config, foundation, and docs
        run: |
          grep -R "ONB-R001" backend/config/onboarding_governance.php backend/config/pos_foundation.php docs/PROJECT_RULES.md
          grep -R "ONB-R013" backend/config/onboarding_governance.php docs/PROJECT_RULES.md
          grep -R "ONB-R018" backend/config/onboarding_governance.php docs/PROJECT_RULES.md
          grep -R "ONB-R026" backend/config/onboarding_governance.php docs/PROJECT_RULES.md

      - name: Sprint 33 architecture + evidence docs exist
        run: |
          test -f docs/architecture/sprint-33-tenant-onboarding-trial-activation-first-branch-provisioning.md
          test -f docs/sprints/sprint-33-tenant-onboarding-trial-activation-first-branch-provisioning-evidence.md

      - name: Sprint 33 smoke script
        run: bash scripts/sprint33_smoke.sh

      - name: No forbidden files committed
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|\.apk$|\.aab$|(^|/)vendor/|(^|/)node_modules/|\.sqlite$|database\.sqlite|(^|/)app/build/|(^|/)\.gradle/|\.keystore$|\.jks$'

  backend-tests:
    name: Backend tests (onboarding + Sprint 0–32 regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Validate composer
        working-directory: backend
        run: composer validate --strict

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Onboarding plan readiness (read-only, no secrets)
        working-directory: backend
        run: php artisan onboarding:plan-readiness --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Onboarding governance audit
        working-directory: backend
        run: php artisan onboarding:governance-audit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Onboarding GO / WATCH / NO-GO (Sprint 33 gate)
        working-directory: backend
        run: php artisan onboarding:go-no-go --strict --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Prior sprint gates (Sprint 24–32) still green
        working-directory: backend
        run: |
          php artisan entitlement:go-no-go --json
          php artisan payment-gateway:go-no-go --json
          php artisan billing:go-no-go --json
          php artisan export-governance:go-no-go --strict --json
          php artisan usage-ledger:go-no-go --strict --json
          php artisan report-export-metering:go-no-go --json
          php artisan tenant-plan:go-no-go --json
          php artisan tenant-lifecycle:go-no-go --json
          php artisan subscription-renewal:go-no-go --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Backend test suite (onboarding + full regression)
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: No secret/PII leak in onboarding command output
        working-directory: backend
        run: |
          ! php artisan onboarding:plan-readiness --json | grep -Ei 'password|secret|server_key=|sk_live_|private_key'
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  android-build-test:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Package and SDK levels intact
        run: |
          grep -q "com.aishtech.poslite" android/app/build.gradle.kts
          grep -q "minSdk = 26" android/app/build.gradle.kts
          grep -q "targetSdk = 35" android/app/build.gradle.kts

      - name: Android release readiness
        run: bash scripts/android_release_readiness.sh

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
