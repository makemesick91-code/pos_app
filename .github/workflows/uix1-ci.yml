name: UIX CI

on:
  # CICD-CTRL-2: neutralized to manual-only; superseded by ci-authoritative.yml (Lane B)
  # and ci-main-smoke.yml (Lane C). Full validation still runnable on demand.
  workflow_dispatch:
jobs:
  design-gate:
    name: Design foundation gate + backend regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: UIX-1 design foundation gate
        run: bash scripts/uix1_design_gate.sh

      - name: UIX-2 premium public experience gate
        run: bash scripts/uix2_design_gate.sh

      - name: UIX-1 rules present (UIX-R001..R022)
        run: |
          for i in $(seq -w 1 22); do
            grep -q "UIX-R0$i" docs/PROJECT_RULES.md
            grep -q "UIX-R0$i" docs/foundation/uix-1-design-system.md
          done

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare sqlite environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Backend full test suite
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  android:
    name: Android build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Android unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

      - name: Android assemble debug
        working-directory: android
        run: ./gradlew assembleDebug
