      - name: Pilot health summary (JSON, no secrets)
        working-directory: backend
        run: php artisan pilot:health-summary --json --strict
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Hypercare issue triage (JSON, no secrets)
        working-directory: backend
        run: php artisan hypercare:issue-triage --json --strict
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  pilot-stabilization-gate:
    name: Pilot stabilization / defect gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/cache
          touch database/database.sqlite
          php artisan migrate --force || true
