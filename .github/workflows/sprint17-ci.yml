name: Sprint 17 CI

on:
  push:
  pull_request:

jobs:
  foundation-and-smoke:
    name: Foundation & Sprint 17 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Foundation document exists
        run: test -f docs/foundation/POS_ANDROID_SAAS_FOUNDATION.md

      - name: Project rules lock intact (Sprint 0–17)
        run: |
          grep -q "Foundation Lock Index" docs/PROJECT_RULES.md
          grep -q "Sprint 0 Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 14 Pilot Release Candidate & Operator UAT Foundation Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 15 Pilot Deployment & Field Trial Evidence Foundation Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 16 Pilot Monitoring & Hypercare Foundation Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 17 Pilot Stabilization & Defect Burn-down Foundation Runtime Rule" docs/PROJECT_RULES.md

      - name: Sprint 17 smoke script
        run: bash scripts/sprint17_smoke.sh

      - name: Android release readiness script
        run: bash scripts/android_release_readiness.sh

      - name: No forbidden files committed
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|\.apk$|\.aab$|(^|/)vendor/|(^|/)node_modules/|\.sqlite$|database\.sqlite|(^|/)app/build/|(^|/)\.gradle/|\.keystore$|\.jks$'

  backend-tests:
    name: Backend tests (stabilization gate + Sprint 0–16 regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Validate composer
        working-directory: backend
        run: composer validate --strict

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run tests
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  backend-release-gate:
    name: Backend release gate (readiness + go/no-go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Production readiness check (JSON, no secrets)
        working-directory: backend
        run: php artisan production:readiness-check --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Release GO/NO-GO (JSON, no secrets)
        working-directory: backend
        run: php artisan release:go-no-go --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  pilot-rc-uat-gate:
    name: Pilot RC / UAT gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
