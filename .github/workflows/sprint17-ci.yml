      - name: Pilot deployment check (JSON, no secrets)
        working-directory: backend
        run: php artisan pilot:deployment-check --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Pilot field trial summary (JSON, no secrets)
        working-directory: backend
        run: php artisan pilot:field-trial-summary --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  pilot-monitoring-hypercare-gate:
    name: Pilot monitoring / hypercare gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
