          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Pilot RC check (JSON, no secrets)
        working-directory: backend
        run: php artisan pilot:rc-check --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Pilot UAT summary (JSON, no secrets)
        working-directory: backend
        run: php artisan pilot:uat-summary --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  pilot-deployment-field-gate:
    name: Pilot deployment / field trial gate
