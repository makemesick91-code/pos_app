name: Sprint 23 CI

on:
  push:
  pull_request:

jobs:
  foundation-and-smoke:
    name: Foundation & Sprint 23 smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Foundation document exists
        run: test -f docs/foundation/POS_ANDROID_SAAS_FOUNDATION.md

      - name: Project rules lock intact (Sprint 0–23)
        run: |
          grep -q "Foundation Lock Index" docs/PROJECT_RULES.md
          grep -q "Sprint 0 Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 21 Public Website / Landing Page Readiness Foundation Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 22 Lead Management / Sales Pipeline Readiness Foundation Runtime Rule" docs/PROJECT_RULES.md
          grep -q "Sprint 23 Billing Collection Governance Foundation Runtime Rule" docs/PROJECT_RULES.md

      - name: Sprint 23 smoke script
        run: bash scripts/sprint23_smoke.sh

      - name: Android release readiness script
        run: bash scripts/android_release_readiness.sh

      - name: No forbidden files committed
        run: |
          ! git ls-files | grep -E '(^|/)\.env$|\.apk$|\.aab$|(^|/)vendor/|(^|/)node_modules/|\.sqlite$|database\.sqlite|(^|/)app/build/|(^|/)\.gradle/|\.keystore$|\.jks$'

  backend-tests:
    name: Backend tests (billing collection gate + Sprint 0–22 regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Validate composer
        working-directory: backend
        run: composer validate --strict

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run tests
        working-directory: backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  prior-sprint-gates-13-22:
    name: Prior sprint gates (Sprint 13–22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Release / RC-UAT / deployment / monitoring / stabilization gates
        working-directory: backend
        run: |
          php artisan production:readiness-check --json
          php artisan release:go-no-go --json
          php artisan pilot:rc-check --json
          php artisan pilot:uat-summary --json
          php artisan pilot:deployment-check --json
          php artisan pilot:field-trial-summary --json
          php artisan pilot:daily-monitoring-check --json
          php artisan pilot:health-summary --json
          php artisan hypercare:issue-triage --json
          php artisan pilot:defect-summary --json
          php artisan pilot:burndown-summary --json
          php artisan pilot:sla-check --json
          php artisan pilot:stabilization-go-no-go --json
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Closure / operations / commercial / public website / sales pipeline gates
        working-directory: backend
        run: |
          php artisan pilot:closure-check --json
          php artisan production:handover-summary --json
          php artisan production:signoff-summary --json
          php artisan production:handover-go-no-go --json
          php artisan production:ops-health --json
          php artisan production:incident-summary --json
          php artisan production:backup-governance-check --json
          php artisan production:post-handover-go-no-go --json
          php artisan commercial:onboarding-capacity --json --strict
          php artisan commercial:launch-readiness --json || true
          php artisan commercial:package-summary --json || true
          php artisan commercial:launch-go-no-go --json || true
          php artisan public-website:lead-summary --json --strict
          php artisan public-website:readiness --json || true
          php artisan public-website:content-summary --json || true
          php artisan public-website:go-no-go --json || true
          php artisan sales-pipeline:lead-summary --json --strict
          php artisan sales-pipeline:activity-summary --json --strict
          php artisan sales-pipeline:readiness --json || true
          php artisan sales-pipeline:go-no-go --json || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  billing-collection-gate:
    name: Billing collection readiness gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo, sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment (sqlite + migrate)
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/app storage/logs storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing bootstrap/cache
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Billing invoice + collection summary (JSON, no secrets)
        working-directory: backend
        run: |
          php artisan billing-collection:invoice-summary --json --strict
          php artisan billing-collection:collection-summary --json --strict
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      # These aggregate a governance decision. On a fresh CI database there are no
      # approved sign-offs, so the correct decision is WATCH/NO_GO. The gate
      # validates that the commands run cleanly and leak no secrets; the real GO
      # requires actual sign-offs recorded via the admin API.
      - name: Billing collection readiness (JSON, no secrets)
        working-directory: backend
        run: php artisan billing-collection:readiness --json || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Billing collection GO/WATCH/NO-GO (JSON, no secrets)
        working-directory: backend
        run: php artisan billing-collection:go-no-go --json || true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  android-build-test:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Package and SDK levels intact
        run: |
          grep -q "com.aishtech.poslite" android/app/build.gradle.kts
          grep -q "minSdk = 26" android/app/build.gradle.kts
          grep -q "targetSdk = 35" android/app/build.gradle.kts

      - name: Android release readiness
        run: bash scripts/android_release_readiness.sh

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace
