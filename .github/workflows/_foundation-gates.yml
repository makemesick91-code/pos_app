# Reusable: foundation rules + all design gates + CI architecture gate.
# Pure file/structure validation (no PHP/Android deps) — fast and always run.
name: _foundation-gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  foundation-and-design-gates:
    name: Foundation + design + CI-architecture gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Application foundation rules gate
        run: bash scripts/verify_application_foundation_rules.sh

      - name: UIX design gates (1..7 chain)
        run: |
          bash scripts/uix1_design_gate.sh
          bash scripts/uix2_design_gate.sh
          bash scripts/uix3_design_gate.sh
          bash scripts/uix4_design_gate.sh
          bash scripts/uix5_design_gate.sh
          bash scripts/uix6_design_gate.sh
          bash scripts/uix7_android_design_gate.sh
          bash scripts/uix7_pilot_connectivity_gate.sh
          bash scripts/uix7_runtime_closure_gate.sh

      - name: CICD-CTRL-2 CI architecture gate
        run: bash scripts/ci/cicd_ctrl_2_gate.sh

      - name: Change classifier self-tests
        run: bash tests/ci/classify_changes_test.sh

      - name: UIX-7 runtime closure gate self-tests
        run: bash tests/ci/uix7_runtime_closure_gate_test.sh
